services:
  # ─── Frontend (Static Site on Vercel - not Render) ───
  # Deploy the frontend to Vercel by connecting the GitHub repo directly.
  # Set Build Command: npm run build | Output: dist | Root: /

  # ─── Backend API (Node.js Web Service) ───
  - type: web
    name: krishisaathi-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # Set in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false   # Set to your Vercel frontend URL
      - key: AI_SERVICE_URL
        sync: false   # Set to krishisaathi-ai.onrender.com

  # ─── AI Microservice (Python Web Service) ───
  - type: web
    name: krishisaathi-ai
    runtime: python
    rootDir: AI-Service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
