version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: krishisaathi-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  server:
    build: .
    container_name: krishisaathi-api
    ports:
      - '8000:8000'
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/krishisaathi
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo_data:
